<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNcraft | Other Mods</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Press+Start+2P&family=Space+Mono:wght@400;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style id="bncraft-shared-css">
[data-theme="grayscale"]{--bg-dark:#0a0a0a;--card-bg:#141414;--accent:#e0e0e0;--modal-bg:#111;--text-main:#f5f5f5;--text-label:rgba(245,245,245,.45);--nav-bg:rgba(10,10,10,.96);--border-color:rgba(255,255,255,.18);--info-card-bg:rgba(255,255,255,.05);--menu-item-hover:rgba(255,255,255,.08)}
[data-theme="pink"]{--bg-dark:#120008;--card-bg:#1f0012;--accent:#ff69b4;--modal-bg:#1a000f;--text-main:#fff;--text-label:rgba(255,200,230,.55);--nav-bg:rgba(18,0,8,.96);--border-color:rgba(255,105,180,.22);--info-card-bg:rgba(255,105,180,.06);--menu-item-hover:rgba(255,105,180,.1)}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:8000;display:none}
.settings-overlay.open{display:block}
.settings-panel{position:fixed;top:0;right:0;width:min(420px,100vw);height:100%;background:var(--modal-bg);border-left:1px solid var(--border-color);z-index:8100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
.settings-panel.open{transform:translateX(0)}
.settings-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border-color);position:sticky;top:0;background:var(--modal-bg);z-index:2}
.settings-panel-title{font-family:'Press Start 2P',cursive;font-size:11px;color:var(--accent)}
.settings-close-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-main);width:36px;height:36px;border-radius:8px;cursor:pointer}
.settings-panel-body{padding:12px 16px 40px}
.settings-section{margin-bottom:20px}
.settings-section-title{font-family:'Press Start 2P',cursive;font-size:9px;color:var(--accent);margin-bottom:12px}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.settings-row-title{font-weight:800;font-size:12px;text-transform:uppercase}
.pixel-toggle img{width:72px;height:38px;image-rendering:pixelated}
.modal-link-btn{width:32px;height:32px;background:rgba(0,0,0,.82);border:1px solid var(--accent);color:var(--accent);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
body.settings-open{overflow:hidden}
    </style>
    <style>
        :root,
        [data-theme="blue"] {
            --bg-dark: #000b10; --card-bg: #00161f; --accent: #00e5ff;
            --modal-bg: #001a24; --glow: 0 0 25px rgba(0,229,255,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(0,11,16,0.95);
            --grid-color: rgba(0,229,255,0.03); --border-color: rgba(0,229,255,0.15);
            --border-hover: rgba(0,229,255,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(0,229,255,0.08);
        }
        [data-theme="purple"] {
            --bg-dark: #080010; --card-bg: #12001e; --accent: #bf00ff;
            --modal-bg: #160022; --glow: 0 0 25px rgba(191,0,255,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(8,0,16,0.95);
            --grid-color: rgba(191,0,255,0.03); --border-color: rgba(191,0,255,0.15);
            --border-hover: rgba(191,0,255,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(191,0,255,0.08);
        }
        [data-theme="red"] {
            --bg-dark: #0f0000; --card-bg: #1e0000; --accent: #ff2222;
            --modal-bg: #220000; --glow: 0 0 25px rgba(255,34,34,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(15,0,0,0.95);
            --grid-color: rgba(255,34,34,0.03); --border-color: rgba(255,34,34,0.15);
            --border-hover: rgba(255,34,34,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(255,34,34,0.08);
        }
        [data-theme="green"] {
            --bg-dark: #001008; --card-bg: #001d10; --accent: #00ff88;
            --modal-bg: #001a10; --glow: 0 0 25px rgba(0,255,136,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(0,16,8,0.95);
            --grid-color: rgba(0,255,136,0.03); --border-color: rgba(0,255,136,0.15);
            --border-hover: rgba(0,255,136,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(0,255,136,0.08);
        }
        [data-theme="yellow"] {
            --bg-dark: #0e0e00; --card-bg: #1c1c00; --accent: #ffe000;
            --modal-bg: #1a1900; --glow: 0 0 25px rgba(255,224,0,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(14,14,0,0.95);
            --grid-color: rgba(255,224,0,0.03); --border-color: rgba(255,224,0,0.15);
            --border-hover: rgba(255,224,0,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(255,224,0,0.08);
        }
        [data-theme="orange"] {
            --bg-dark: #0e0700; --card-bg: #1e1000; --accent: #ff8c00;
            --modal-bg: #1a0d00; --glow: 0 0 25px rgba(255,140,0,0.4);
            --text-main: #ffffff; --text-sub: rgba(255,255,255,0.8);
            --text-label: rgba(255,255,255,0.5); --nav-bg: rgba(14,7,0,0.95);
            --grid-color: rgba(255,140,0,0.03); --border-color: rgba(255,140,0,0.15);
            --border-hover: rgba(255,140,0,0.8); --info-card-bg: rgba(255,255,255,0.03);
            --desc-bg: rgba(0,0,0,0.2); --menu-item-hover: rgba(255,140,0,0.08);
        }
        [data-theme="white"] {
            --bg-dark: #eef2f7; --card-bg: #ffffff; --accent: #0077cc;
            --modal-bg: #f4f8fc; --glow: 0 0 20px rgba(0,119,204,0.25);
            --text-main: #111111; --text-sub: rgba(0,0,0,0.75);
            --text-label: rgba(0,0,0,0.5); --nav-bg: rgba(238,242,247,0.97);
            --grid-color: rgba(0,119,204,0.05); --border-color: rgba(0,119,204,0.2);
            --border-hover: rgba(0,119,204,0.8); --info-card-bg: rgba(0,0,0,0.04);
            --desc-bg: rgba(0,0,0,0.04); --menu-item-hover: rgba(0,119,204,0.08);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Inter', sans-serif; overflow-x: hidden;
            transition: background-color 0.35s ease, color 0.35s ease;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size:40px 40px; pointer-events:none; z-index:0;
        }
        body::after {
            content:''; position:fixed; top:-150px; left:50%;
            transform:translateX(-50%); width:600px; height:600px;
            background:radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
            pointer-events:none; z-index:0; animation:pulse 4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.1);} }

        /* NAV */
        nav {
            width:100%; height:70px; display:flex; align-items:center; justify-content:space-between;
            padding:0 20px; border-bottom:1px solid var(--border-color);
            background:var(--nav-bg); backdrop-filter:blur(10px);
            position:sticky; top:0; z-index:1000;
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .nav-logo-img { height:45px; filter:drop-shadow(0 0 8px var(--accent)); }
        .nav-right { display:flex; align-items:center; gap:10px; }
        .hamburger-btn {
            background:transparent; border:1px solid var(--border-color);
            color:var(--text-main); width:42px; height:42px; border-radius:10px;
            cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:5px; transition:.3s;
        }
        .hamburger-btn:hover { border-color:var(--accent); box-shadow:var(--glow); }
        .hamburger-btn span { display:block; width:18px; height:2px; background:var(--text-main); border-radius:2px; transition:.3s; }
        .hamburger-btn.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
        .hamburger-btn.open span:nth-child(2) { opacity:0; }
        .hamburger-btn.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

        .hamburger-menu {
            position:fixed; top:80px; right:20px; background:var(--modal-bg);
            border:1px solid var(--border-color); border-radius:16px; padding:10px;
            z-index:5000; display:none; min-width:220px; box-shadow:var(--glow);
            transition: background 0.35s ease;
        }
        .hamburger-menu.open { display:block; animation:menuSlide .2s ease; }
        @keyframes menuSlide { from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);} }
        .menu-item {
            display:flex; align-items:center; gap:12px; padding:12px 16px;
            border-radius:10px; cursor:pointer; text-decoration:none;
            color:var(--text-main); font-weight:700; font-size:14px;
            transition:.2s; background:transparent; border:none; width:100%; text-align:left;
        }
        .menu-item:hover { background:var(--menu-item-hover); color:var(--accent); }
        .menu-item svg { width:18px; height:18px; flex-shrink:0; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .menu-divider { height:1px; background:var(--border-color); margin:6px 0; }
        .theme-sub { display:none; padding:10px 8px 4px; }
        .theme-sub.open { display:block; }
        .theme-sub-title { font-size:10px; font-weight:900; text-transform:uppercase; color:var(--text-label); letter-spacing:1px; margin-bottom:10px; padding-left:8px; }
        .theme-dots-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; padding-bottom:6px; }
        .theme-dot-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
        .theme-dot { width:32px; height:32px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:.25s; }
        .theme-dot:hover { transform:scale(1.15); }
        .theme-dot.active-theme { border-color:var(--text-main); box-shadow:0 0 8px rgba(255,255,255,0.35); }
        .theme-dot[data-t="blue"]   { background:radial-gradient(circle at 35% 35%,#00e5ff,#002d3f); }
        .theme-dot[data-t="purple"] { background:radial-gradient(circle at 35% 35%,#bf00ff,#200035); }
        .theme-dot[data-t="red"]    { background:radial-gradient(circle at 35% 35%,#ff2222,#380000); }
        .theme-dot[data-t="green"]  { background:radial-gradient(circle at 35% 35%,#00ff88,#003015); }
        .theme-dot[data-t="yellow"] { background:radial-gradient(circle at 35% 35%,#ffe000,#302e00); }
        .theme-dot[data-t="orange"] { background:radial-gradient(circle at 35% 35%,#ff8c00,#351c00); }
        .theme-dot[data-t="white"]  { background:radial-gradient(circle at 35% 35%,#ffffff,#aabbd0); border-color:#bbb; }
        .theme-dot-lbl { font-size:9px; font-weight:700; text-transform:uppercase; color:var(--text-label); }
        .fav-count-badge { background:var(--accent); color:#000; font-size:9px; font-weight:900; border-radius:10px; padding:1px 6px; margin-left:auto; display:none; }
        .fav-count-badge.visible { display:inline-block; }

        /* HEADER */
        .header-section { padding:40px 20px 20px; text-align:center; position:relative; z-index:1; }
        .header-title { font-size:clamp(24px,8vw,42px); font-weight:900; text-transform:uppercase; color:var(--text-main); }

        /* SEARCH */
        .controls { max-width:800px; margin:0 auto 30px; padding:0 15px; position:relative; z-index:1; }
        .search-input {
            width:100%; padding:15px; background:var(--info-card-bg);
            border:1px solid var(--accent); border-radius:12px;
            color:var(--text-main); outline:none; font-size:16px; text-align:center;
            transition: background 0.35s ease; font-family:'Inter',sans-serif;
        }
        .search-input::placeholder { color:var(--text-label); }

        /* GRID */
        .mod-grid {
            display:grid; gap:20px; width:95%; max-width:1200px;
            margin:0 auto 60px;
            grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
            position:relative; z-index:1;
        }

        /* CARD */
        .mod-card {
            background:var(--card-bg); border-radius:20px; overflow:hidden;
            border:1px solid var(--border-color); transition:all .3s ease;
            position:relative; cursor:pointer;
        }
        .mod-card:hover { transform:translateY(-5px); border-color:var(--accent); box-shadow:var(--glow); }

        .ver-badge {
            position:absolute; top:10px; left:10px; z-index:5;
            background:rgba(0,0,0,0.8); color:var(--accent);
            padding:5px 12px; border-radius:8px;
            font-size:10px; font-weight:900; text-transform:uppercase;
            border:1px solid var(--accent); backdrop-filter:blur(6px);
            pointer-events:none;
        }

        /* IMAGE — full, no cropping */
        .img-container { width:100%; overflow:hidden; line-height:0; }
        .img-container img { width:100%; height:auto; display:block; object-fit:contain; }

        /* INFO */
        .mod-info { padding:20px; }
        .mod-name { font-size:18px; font-weight:900; margin-bottom:10px; color:var(--text-main); line-height:1.3; }
        .mod-desc-preview {
            font-size:12px; font-weight:600; color:var(--text-label);
            line-height:1.6; margin-bottom:12px;
            overflow:hidden; display:-webkit-box;
            -webkit-line-clamp:2; -webkit-box-orient:vertical;
        }
        .mod-meta-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
        .meta-chip { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--text-label); }
        .meta-chip svg { width:12px; height:12px; stroke:var(--text-label); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
        .dl-trigger {
            width:100%; background:var(--accent); color:#000; border:none;
            padding:13px; border-radius:10px; font-weight:900;
            cursor:pointer; transition:all .3s ease; font-size:14px;
            font-family:'Inter',sans-serif; text-transform:uppercase; letter-spacing:0.5px;
        }
        .dl-trigger:hover { opacity:.85; transform:scale(1.02); }

        /* EMPTY */
        .empty-state { grid-column:1/-1; text-align:center; padding:80px 20px; color:var(--text-label); }
        .empty-state svg { width:64px; height:64px; margin-bottom:16px; opacity:.3; stroke:var(--accent); fill:none; stroke-width:1.5; }
        .empty-state p { font-size:18px; font-weight:700; }

        /* MODAL */
        .modal-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95); display:none;
            justify-content:center; align-items:center;
            z-index:9999; backdrop-filter:blur(12px); padding:15px;
        }
        .modal-content {
            background:var(--modal-bg); border:2px solid var(--accent);
            border-radius:24px; width:100%; max-width:520px;
            position:relative; max-height:90vh; overflow-y:auto;
            box-shadow:var(--glow);
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .modal-content::-webkit-scrollbar { width:6px; }
        .modal-content::-webkit-scrollbar-track { background:rgba(0,0,0,0.3); border-radius:10px; }
        .modal-content::-webkit-scrollbar-thumb { background:var(--accent); border-radius:10px; }
        .modal-banner { padding:10px; position:relative; }
        .modal-banner img { width:100%; border-radius:16px; display:block; }
        .modal-actions { position:absolute; top:20px; right:20px; display:flex; gap:8px; z-index:10; }
        .modal-heart-btn {
            width:32px; height:32px; background:rgba(0,0,0,0.8);
            border:1px solid rgba(255,80,120,0.6); color:rgba(255,80,120,0.7);
            border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center; transition:all .3s ease;
        }
        .modal-heart-btn:hover { background:rgba(255,80,120,0.15); }
        .modal-heart-btn.faved { background:rgba(255,80,120,0.2); border-color:#ff5078; color:#ff5078; }
        .modal-heart-btn svg { width:16px; height:16px; }
        .close-btn {
            width:32px; height:32px; background:rgba(0,0,0,0.8);
            border:1px solid #ff4d4d; color:#ff4d4d; border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .3s ease;
        }
        .close-btn:hover { background:#ff4d4d; color:white; transform:rotate(90deg); }
        .modal-body { padding:0 25px 25px; text-align:center; }
        .m-title { font-size:26px; font-weight:900; margin-bottom:20px; color:var(--text-main); }
        .m-info-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:20px; }
        .info-card { background:var(--info-card-bg); padding:10px; border-radius:12px; border:1px solid var(--border-color); }
        .info-label { display:block; font-size:10px; text-transform:uppercase; color:var(--text-label); margin-bottom:4px; }
        .info-val { font-weight:900; font-size:14px; color:var(--accent); }
        .m-desc {
            text-align:left; background:var(--desc-bg); padding:15px; border-radius:12px;
            font-size:13px; line-height:1.6; color:var(--text-sub);
            margin-bottom:20px; border-left:3px solid var(--accent); white-space:pre-line;
        }
        .v-list { display:flex; flex-direction:column; gap:10px; }
        .v-btn {
            display:flex; justify-content:space-between; align-items:center;
            background:var(--accent); color:#000; text-decoration:none;
            padding:16px; border-radius:15px; font-weight:900; font-size:14px; transition:all .3s ease;
        }
        .v-btn:hover { opacity:.85; transform:scale(1.02); }

        /* FOOTER */
        .social-footer {
            width:100%; padding:30px 20px; display:flex; flex-wrap:wrap; gap:20px;
            justify-content:center; border-top:1px solid var(--border-color);
            margin-top:20px; position:relative; z-index:1;
        }
        .social-icon { width:45px; height:45px; transition:all .3s ease; opacity:.8; }
        .social-icon:hover { transform:translateY(-5px) scale(1.1); opacity:1; filter:drop-shadow(0 0 15px var(--accent)); }
        .footer-text { text-align:center; font-size:12px; color:var(--text-label); letter-spacing:1px; padding-bottom:30px; position:relative; z-index:1; }

        [data-theme="white"] .header-title { color:#111; }
        [data-theme="white"] .mod-name { color:#111; }
        [data-theme="white"] .m-title { color:#111; }
        [data-theme="white"] .search-input { background:#fff; }
        [data-theme="white"] body::after { background:radial-gradient(circle,rgba(0,119,204,0.06) 0%,transparent 70%); }
    </style>
</head>

let favorites = JSON.parse(localStorage.getItem('bncraft-othermods-favs') || '[]');
let currentModId = '';
let showingFavs = false;

function saveFavs() { localStorage.setItem('bncraft-othermods-favs', JSON.stringify(favorites)); }
function isFav(id) { return favorites.includes(id); }

function heartSVG(filled) {
    return filled
        ? `<svg viewBox="0 0 24 24" style="fill:#ff5078;stroke:#ff5078;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`
        : `<svg viewBox="0 0 24 24" style="fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
}

function toggleFavorite() {
    if (!currentModId) return;
    const btn = document.getElementById('modalHeartBtn');
    if (isFav(currentModId)) {
        favorites = favorites.filter(f => f !== currentModId);
        btn.classList.remove('faved');
        btn.innerHTML = heartSVG(false);
    } else {
        favorites.push(currentModId);
        btn.classList.add('faved');
        btn.innerHTML = heartSVG(true);
    }
    saveFavs();
    updateFavBadge();
    if (showingFavs) filterMods();
}

function updateFavBadge() {
    const b = document.getElementById('favCountBadge');
    if (favorites.length > 0) { b.textContent = favorites.length; b.classList.add('visible'); }
    else b.classList.remove('visible');
}

function showFavorites() {
    showingFavs = true;
    document.getElementById('pageTitle').textContent = 'MY FAVORITES';
    closeMenu();
    filterMods();
}

function renderMods(data) {
    const grid = document.getElementById('modGrid');
    if (!data.length) {
        grid.innerHTML = `<div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <p>${showingFavs ? 'No favorites yet' : 'No mods found'}</p>
        </div>`;
        return;
    }
    grid.innerHTML = data.map(m => {
        const isMulti = m.links.length > 1;
        const latestLink = m.links[m.links.length - 1];
        return `
        <div class="mod-card" onclick="openModal('${m.id}')">
            ${isMulti ? `<div class="ver-badge">${m.links.length} VERSIONS</div>` : ''}
            <div class="img-container">
                <img src="${m.img}" alt="${m.name}" loading="lazy">
            </div>
            <div class="mod-info">
                <div class="mod-name">${m.name}</div>
                <div class="mod-meta-row">
                    <div class="meta-chip">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        ${latestLink.size}
                    </div>
                    <div class="meta-chip">
                        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
                        ${m.downloadSource}
                    </div>
                </div>
                <button class="dl-trigger">DOWNLOAD</button>
            </div>
        </div>`;
    }).join('');
}

function filterMods() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = showingFavs
        ? mods.filter(m => isFav(m.id) && m.name.toLowerCase().includes(term))
        : mods.filter(m => m.name.toLowerCase().includes(term));
    renderMods(filtered);
}

function openModal(id) {
    const m = mods.find(x => x.id === id);
    currentModId = id;
    document.getElementById('m-img').src = m.img;
    document.getElementById('m-title').textContent = m.name;
    const shareUrl = BNcraft.buildOtherModShareUrl(m.name);
    const shareA = document.getElementById('otherModShareLink');
    if (shareA) { shareA.href = shareUrl; shareA.textContent = shareUrl.replace(/^https?:\/\//, ''); }
    const latestLink = m.links[m.links.length - 1];
    document.getElementById('m-info-grid').innerHTML = `
        <div class="info-card"><span class="info-label">Size</span><span class="info-val">${latestLink.size}</span></div>
        <div class="info-card"><span class="info-label">Versions</span><span class="info-val">${m.links.length}</span></div>
        <div class="info-card" style="grid-column:1/-1"><span class="info-label">Download Source</span><span class="info-val">${m.downloadSource}</span></div>`;
    const descEl = document.getElementById('m-desc');
    if (m.desc) { descEl.textContent = m.desc; descEl.style.display = 'block'; }
    else descEl.style.display = 'none';
    document.getElementById('v-list').innerHTML = m.links.map(l =>
        `<a href="${l.url}" target="_blank" class="v-btn"><span>${l.label}</span><span>${l.size}</span></a>`
    ).join('');
    const heartBtn = document.getElementById('modalHeartBtn');
    heartBtn.classList.toggle('faved', isFav(id));
    heartBtn.innerHTML = heartSVG(isFav(id));
    document.getElementById('modalOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.body.style.overflow = 'auto';
    currentModId = '';
}

window.onclick = e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); };

function copyOtherModLink(e) {
    e.preventDefault();
    e.stopPropagation();
    const m = mods.find(x => x.id === currentModId);
    if (!m) return;
    const url = BNcraft.buildOtherModShareUrl(m.name);
    navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('copyOtherLinkBtn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => alert(url));
}

function closeMenu() { BNcraft.closeMenu(); }
function toggleMenu() { BNcraft.toggleMenu(); }

function setTheme(t) { BNcraft.setTheme(t); }

(function init() {
    BNcraft.buildSettingsPanel('settingsPanelContent', { cardInfo: false });
    const saved = localStorage.getItem('bncraft-theme');
    if (saved) setTheme(saved);
    const savedFont = localStorage.getItem('bncraft-font');
    if (savedFont) BNcraft.setFont(savedFont);
    updateFavBadge();
    renderMods(mods);
})();
</script>
</body>
</html>
