<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNcraft | Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/bncraft-shared.css">
    <style>
        :root, [data-theme="blue"] {
            --bg-dark: #000b10; --card-bg: #00161f; --accent-cyan: #00e5ff;
            --modal-bg: #001a24; --glow: 0 0 25px rgba(0, 229, 255, 0.4);
            --glow-strong: 0 0 45px rgba(0, 229, 255, 0.6);
            --text-main: #fff; --border-color: rgba(0,229,255,0.1);
        }
        [data-theme="purple"] { --bg-dark:#080010; --card-bg:#12001e; --accent-cyan:#bf00ff; --modal-bg:#160022; --glow:0 0 25px rgba(191,0,255,0.4); --glow-strong:0 0 45px rgba(191,0,255,0.6); }
        [data-theme="red"] { --bg-dark:#0f0000; --card-bg:#1e0000; --accent-cyan:#ff2222; --modal-bg:#220000; --glow:0 0 25px rgba(255,34,34,0.4); }
        [data-theme="green"] { --bg-dark:#001008; --card-bg:#001d10; --accent-cyan:#00ff88; --modal-bg:#001a10; --glow:0 0 25px rgba(0,255,136,0.4); }
        [data-theme="yellow"] { --bg-dark:#0e0e00; --card-bg:#1c1c00; --accent-cyan:#ffe000; --modal-bg:#1a1900; --glow:0 0 25px rgba(255,224,0,0.4); }
        [data-theme="orange"] { --bg-dark:#0e0700; --card-bg:#1e1000; --accent-cyan:#ff8c00; --modal-bg:#1a0d00; --glow:0 0 25px rgba(255,140,0,0.4); }
        [data-theme="white"] { --bg-dark:#eef2f7; --card-bg:#fff; --accent-cyan:#0077cc; --modal-bg:#f4f8fc; --text-main:#111; --glow:0 0 20px rgba(0,119,204,0.25); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark); color: var(--text-main, white);
            font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; position: relative;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 0; animation: pulse 4s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); } 50% { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        .links-settings-btn {
            position: fixed; top: 16px; right: 16px; z-index: 100; width: 44px; height: 44px;
            border-radius: 50%; border: 1px solid var(--accent-cyan); background: rgba(0,0,0,0.5);
            color: var(--accent-cyan); font-size: 20px; cursor: pointer; backdrop-filter: blur(8px);
        }
        .container { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 48px 20px 60px; display: flex; flex-direction: column; align-items: center; }
        .avatar-wrapper { position: relative; margin-bottom: 20px; }
        .avatar-ring {
            position: absolute; inset: -6px; border-radius: 50%; border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent-cyan), transparent, var(--accent-cyan)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out; mask-composite: exclude; animation: spin 6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; filter: drop-shadow(0 0 16px rgba(0,229,255,0.5)); }
        .profile-name {
            font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; text-align: center;
            background: linear-gradient(135deg, var(--text-main, #fff) 40%, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;
        }
        .profile-tagline { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 36px; }
        .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent); margin-bottom: 36px; }
        .featured-card {
            width: 100%; background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(0,22,31,0.9));
            border: 1px solid var(--accent-cyan); border-radius: 18px; padding: 20px 24px; text-decoration: none; color: var(--text-main, white);
            display: flex; align-items: center; gap: 16px; margin-bottom: 14px; transition: all 0.3s ease; box-shadow: var(--glow);
        }
        .featured-card:hover { transform: translateY(-3px); box-shadow: var(--glow-strong); border-color: #fff; }
        .featured-icon { width: 60px; height: 60px; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 8px; }
        .featured-icon img { width: 100%; height: 100%; object-fit: contain; }
        .featured-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-cyan); font-weight: 600; margin-bottom: 3px; }
        .featured-title { font-size: 16px; font-weight: 800; }
        .featured-arrow { font-size: 18px; color: var(--accent-cyan); }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-bottom: 14px; align-self: flex-start; font-weight: 600; }
        .links-grid { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
        .link-card {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 12px 20px; text-decoration: none; color: var(--text-main, white); display: flex; align-items: center; gap: 16px; transition: all 0.3s ease;
        }
        .link-card:hover { border-color: var(--accent-cyan); transform: translateX(4px); box-shadow: 0 0 15px rgba(0,229,255,0.15); }
        .link-icon { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .link-icon img { width: 100%; height: 100%; object-fit: contain; }
        .link-platform { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 2px; }
        .link-name { font-size: 15px; font-weight: 700; }
        .link-arrow { font-size: 14px; color: rgba(255,255,255,0.3); }
        .email-card {
            width: 100%; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 14px;
            padding: 12px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; user-select: none;
        }
        .email-card:hover { border-color: var(--accent-cyan); transform: translateX(4px); }
        .copy-badge { font-size: 11px; background: rgba(0,229,255,0.15); color: var(--accent-cyan); padding: 4px 10px; border-radius: 6px; font-weight: 700; }
        .copy-badge.copied { background: rgba(0,255,150,0.15); color: #00ff96; }
        .footer { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; letter-spacing: 1px; }
        .animate-in { opacity: 0; transform: translateY(20px); animation: fadeUp 0.5s ease forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .delay-1 { animation-delay: 0.05s; } .delay-2 { animation-delay: 0.1s; } .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; } .delay-5 { animation-delay: 0.25s; } .delay-6 { animation-delay: 0.3s; }
        .delay-7 { animation-delay: 0.35s; } .delay-8 { animation-delay: 0.4s; } .delay-9 { animation-delay: 0.45s; } .delay-10 { animation-delay: 0.5s; }
    </style>
</head>
<body>
<button type="button" class="links-settings-btn" onclick="BNcraft.openSettingsPanel()" aria-label="Settings" title="Settings">⚙</button>
<div class="container">

    <div class="section-label animate-in delay-5" style="margin-top:10px;">📱 SOCIAL MEDIA</div>
    <div class="links-grid">

</div>
<div class="settings-overlay" id="settingsOverlay" onclick="BNcraft.closeSettingsPanel()"></div>
<aside class="settings-panel" id="settingsPanel">
    <div class="settings-panel-header">
        <span class="settings-panel-title">SETTINGS</span>
        <button type="button" class="settings-close-btn" onclick="BNcraft.closeSettingsPanel()">✕</button>
    </div>

</aside>
<script src="js/bncraft-toggle-off.js"></script>
<script src="js/bncraft-core.js"></script>
<script>
function copyEmail() {
    navigator.clipboard.writeText('bncraft.to@gmail.com').then(() => {
        const badge = document.getElementById('copyBadge');
        badge.textContent = 'COPIED ✓';
        badge.classList.add('copied');
        setTimeout(() => { badge.textContent = 'COPY'; badge.classList.remove('copied'); }, 2000);
    });
}
(function () {
    BNcraft.buildSettingsPanel('settingsPanelContent', { page: 'home', cardInfo: false, interface: false });
})();
</script>
</body>
</html>
