<!DOCTYPE html>
<html lang="en" data-theme="blue">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNcraft | Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root,[data-theme="blue"]{--bg:#050a0f;--card:#0d1520;--accent:#00e5ff;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(0,229,255,.2);--glow:0 0 30px rgba(0,229,255,.35)}
        [data-theme="purple"]{--bg:#080010;--card:#12001e;--accent:#bf00ff;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(191,0,255,.25);--glow:0 0 30px rgba(191,0,255,.35)}
        [data-theme="red"]{--bg:#0f0000;--card:#1e0000;--accent:#ff4444;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(255,68,68,.25);--glow:0 0 30px rgba(255,68,68,.35)}
        [data-theme="green"]{--bg:#001008;--card:#001d10;--accent:#00ff88;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(0,255,136,.25);--glow:0 0 30px rgba(0,255,136,.35)}
        [data-theme="yellow"]{--bg:#0e0e00;--card:#1c1c00;--accent:#ffe000;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(255,224,0,.25);--glow:0 0 30px rgba(255,224,0,.35)}
        [data-theme="orange"]{--bg:#0e0700;--card:#1e1000;--accent:#ff8c00;--text:#fff;--muted:rgba(255,255,255,.5);--border:rgba(255,140,0,.25);--glow:0 0 30px rgba(255,140,0,.35)}
        [data-theme="white"]{--bg:#eef2f7;--card:#fff;--accent:#0077cc;--text:#111;--muted:rgba(0,0,0,.5);--border:rgba(0,119,204,.2);--glow:0 0 24px rgba(0,119,204,.2)}
        [data-theme="grayscale"]{--bg:#0a0a0a;--card:#141414;--accent:#e0e0e0;--text:#f5f5f5;--muted:rgba(245,245,245,.45);--border:rgba(255,255,255,.18);--glow:0 0 24px rgba(255,255,255,.15)}
        [data-theme="pink"]{--bg:#120008;--card:#1f0012;--accent:#ff69b4;--text:#fff;--muted:rgba(255,200,230,.55);--border:rgba(255,105,180,.22);--glow:0 0 30px rgba(255,105,180,.4)}
        *{box-sizing:border-box;margin:0;padding:0}
        body{min-height:100vh;background:var(--bg);color:var(--text);font-family:Inter,sans-serif;overflow-x:hidden}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,color-mix(in srgb,var(--accent) 18%,transparent),transparent);pointer-events:none}
        .top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:14px 18px}
        .top a,.top button{background:var(--card);border:1px solid var(--border);color:var(--accent);width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none}
        .top svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
        .wrap{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:80px 20px 48px}
        .hero{text-align:center;margin-bottom:32px}
        .logo{width:88px;height:88px;margin:0 auto 16px;border-radius:22px;background:linear-gradient(145deg,var(--accent),transparent);padding:2px;box-shadow:var(--glow)}
        .logo img{width:100%;height:100%;border-radius:20px;object-fit:cover;display:block}
        .hero h1{font-size:32px;font-weight:900;letter-spacing:3px}
        .hero p{margin-top:8px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
        .grid{display:flex;flex-direction:column;gap:10px}
        .link{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;text-decoration:none;color:var(--text);background:var(--card);border:1px solid var(--border);transition:transform .2s,box-shadow .2s,border-color .2s}
        .link:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:var(--glow)}
        .link .ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent)}
        .link .ic svg{width:24px;height:24px}
        .link.tiktok .ic{color:#fff;background:#111}
        .link.yt .ic{color:#fff;background:#ff0000}
        .link.ig .ic{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
        .link.fb .ic{color:#fff;background:#1877f2}
        .link.discord .ic{color:#fff;background:#5865f2}
        .link.mail .ic{color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent)}
        .link .meta{flex:1;min-width:0}
        .link .meta small{display:block;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
        .link .meta strong{display:block;font-size:15px;font-weight:700;margin-top:3px}
        .link .go{color:var(--muted);font-size:18px}
        .link.mail .copy{margin-left:auto;padding:8px 12px;border-radius:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:800;cursor:pointer}
        .foot{text-align:center;margin-top:28px;font-size:11px;color:var(--muted)}
        .settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:8000;display:none}
        .settings-overlay.open{display:block}
        .settings-panel{position:fixed;top:0;right:0;width:min(420px,100vw);height:100%;background:var(--card);border-left:1px solid var(--border);z-index:8100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
        .settings-panel.open{transform:translateX(0)}
        .settings-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border)}
        .settings-panel-title{font-family:'Press Start 2P',cursive;font-size:11px;color:var(--accent)}
        .settings-close-btn{background:transparent;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer}
        .settings-panel-body{padding:12px 16px 40px}
        body.settings-open{overflow:hidden}
    </style>
</head>
