<head>

    <style id="bncraft-shared-css">
[data-theme="blue"]{--bg-dark:#000b10;--card-bg:#00161f;--accent:#00e5ff;--modal-bg:#001a24;--glow:0 0 25px rgba(0,229,255,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(0,229,255,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="purple"]{--bg-dark:#080010;--card-bg:#12001e;--accent:#bf00ff;--modal-bg:#160022;--glow:0 0 25px rgba(191,0,255,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(191,0,255,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="red"]{--bg-dark:#0f0000;--card-bg:#1e0000;--accent:#ff2222;--modal-bg:#220000;--glow:0 0 25px rgba(255,34,34,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(255,34,34,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="green"]{--bg-dark:#001008;--card-bg:#001d10;--accent:#00ff88;--modal-bg:#001a10;--glow:0 0 25px rgba(0,255,136,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(0,255,136,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="yellow"]{--bg-dark:#0e0e00;--card-bg:#1c1c00;--accent:#ffe000;--modal-bg:#1a1900;--glow:0 0 25px rgba(255,224,0,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(255,224,0,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="orange"]{--bg-dark:#0e0700;--card-bg:#1e1000;--accent:#ff8c00;--modal-bg:#1a0d00;--glow:0 0 25px rgba(255,140,0,.4);--text-main:#fff;--text-label:rgba(255,255,255,.45);--border-color:rgba(255,140,0,.15);--info-card-bg:rgba(255,255,255,.03)}
[data-theme="white"]{--bg-dark:#eef2f7;--card-bg:#fff;--accent:#0077cc;--modal-bg:#f4f8fc;--glow:0 0 20px rgba(0,119,204,.25);--text-main:#111;--text-label:rgba(0,0,0,.5);--border-color:rgba(0,119,204,.2);--info-card-bg:rgba(0,0,0,.04)}
[data-theme="grayscale"]{--bg-dark:#0a0a0a;--card-bg:#141414;--accent:#e0e0e0;--modal-bg:#111;--glow:0 0 20px rgba(255,255,255,.15);--text-main:#f5f5f5;--text-label:rgba(245,245,245,.45);--border-color:rgba(255,255,255,.18);--info-card-bg:rgba(255,255,255,.05)}
[data-theme="pink"]{--bg-dark:#120008;--card-bg:#1f0012;--accent:#ff69b4;--modal-bg:#1a000f;--glow:0 0 25px rgba(255,105,180,.45);--text-main:#fff;--text-label:rgba(255,200,230,.55);--border-color:rgba(255,105,180,.22);--info-card-bg:rgba(255,105,180,.06)}
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:8000;display:none}.settings-overlay.open{display:block}
.settings-panel{position:fixed;top:0;right:0;width:min(420px,100vw);height:100%;background:var(--modal-bg);border-left:1px solid var(--border-color);z-index:8100;transform:translateX(100%);transition:transform .3s;overflow-y:auto}
.settings-panel.open{transform:translateX(0)}
.settings-panel-header{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border-color);position:sticky;top:0;background:var(--modal-bg);z-index:2}
.settings-panel-title{font-family:'Press Start 2P',cursive;font-size:11px;color:var(--accent)}
.settings-close-btn{background:transparent;border:1px solid var(--border-color);color:var(--text-main);width:36px;height:36px;border-radius:8px;cursor:pointer}
.settings-panel-body{padding:12px 16px 40px}
.settings-section{margin-bottom:20px}
.settings-section-title{font-family:'Press Start 2P',cursive;font-size:9px;color:var(--accent);margin-bottom:12px}
.theme-dots-row{display:flex;flex-wrap:wrap;gap:8px}
.theme-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.theme-dot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.theme-dot.active-theme{border-color:var(--text-main);box-shadow:0 0 8px rgba(255,255,255,.35)}
.theme-dot[data-t="blue"]{background:radial-gradient(circle at 35% 35%,#00e5ff,#002d3f)}
.theme-dot[data-t="purple"]{background:radial-gradient(circle at 35% 35%,#bf00ff,#200035)}
.theme-dot[data-t="red"]{background:radial-gradient(circle at 35% 35%,#ff2222,#380000)}
.theme-dot[data-t="green"]{background:radial-gradient(circle at 35% 35%,#00ff88,#003015)}
.theme-dot[data-t="yellow"]{background:radial-gradient(circle at 35% 35%,#ffe000,#302e00)}
.theme-dot[data-t="orange"]{background:radial-gradient(circle at 35% 35%,#ff8c00,#351c00)}
.theme-dot[data-t="white"]{background:radial-gradient(circle at 35% 35%,#fff,#aabbd0)}
.theme-dot[data-t="grayscale"]{background:radial-gradient(circle at 35% 35%,#e8e8e8,#333)}
.theme-dot[data-t="pink"]{background:radial-gradient(circle at 35% 35%,#ff69b4,#4a0028)}
.theme-dot-lbl{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-label)}
.font-options{display:flex;flex-direction:column;gap:8px}
.font-opt{padding:10px 12px;border-radius:10px;border:1px solid var(--border-color);background:var(--info-card-bg);color:var(--text-main);font-weight:700;cursor:pointer;text-align:left}
.font-opt.active-font{border-color:var(--accent);color:var(--accent)}
.pixel-toggle{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer}
.toggle-track{width:52px;height:28px;border-radius:14px;background:rgba(255,255,255,.12);border:2px solid var(--border-color);position:relative}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#888;transition:transform .2s,background .2s}
.pixel-toggle.is-on .toggle-track{background:rgba(0,229,255,.2);border-color:var(--accent)}
.pixel-toggle.is-on .toggle-knob{transform:translateX(24px);background:var(--accent)}
.toggle-label{font-size:10px;font-weight:900;color:var(--text-label);min-width:24px}
.pixel-toggle.is-on .toggle-label{color:var(--accent)}
    </style>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg-dark);color:var(--text-main);font-family:Inter,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .35s,color .35s}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border-color) 1px,transparent 1px),linear-gradient(90deg,var(--border-color) 1px,transparent 1px);background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0}
        .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;padding:14px 18px}
        .gear-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--border-color);background:var(--card-bg);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center}
        .gear-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2}
        .page{position:relative;z-index:1;max-width:440px;margin:0 auto;padding:72px 20px 48px}
        .hero{text-align:center;margin-bottom:28px}
        .logo-ring{width:96px;height:96px;margin:0 auto 16px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),transparent,var(--accent));box-shadow:var(--glow)}
        .logo-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
        .hero h1{font-size:28px;font-weight:900;letter-spacing:2px}
        .hero p{font-size:12px;color:var(--text-label);text-transform:uppercase;letter-spacing:2px;margin-top:6px}
        .section-lbl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--text-label);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
        .section-lbl svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:2}
        .hero-card{display:flex;align-items:center;gap:14px;padding:18px;border-radius:16px;text-decoration:none;color:var(--text-main);background:linear-gradient(135deg,rgba(0,229,255,.08),var(--card-bg));border:1px solid var(--accent);box-shadow:var(--glow);transition:transform .2s}
        .hero-card:hover{transform:translateY(-2px)}
        .hero-card .ic{width:48px;height:48px;border-radius:12px;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .hero-card .ic svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:2}
        .hero-card strong{display:block;font-size:16px}
        .hero-card span{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px}
        .links{display:flex;flex-direction:column;gap:10px}
        .link-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:14px;text-decoration:none;color:var(--text-main);background:var(--card-bg);border:1px solid var(--border-color);transition:all .25s}
        .link-item:hover{border-color:var(--accent);transform:translateX(4px);box-shadow:var(--glow)}
        .link-item .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .link-item .ic svg{width:22px;height:22px;fill:currentColor}
        .link-item .meta{flex:1;min-width:0}
        .link-item .platform{font-size:10px;font-weight:800;letter-spacing:1.2px;color:var(--text-label);text-transform:uppercase}
        .link-item .name{font-size:15px;font-weight:700;margin-top:2px}
        .link-item .arrow{color:var(--accent);opacity:.6;font-size:18px}
        .ic-tiktok{background:#111;color:#fff}
        .ic-youtube{background:#ff0000;color:#fff}
        .ic-instagram{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
        .ic-facebook{background:#1877f2;color:#fff}
        .ic-discord{background:#5865f2;color:#fff}
        .ic-mail{background:var(--info-card-bg);color:var(--accent);border:1px solid var(--border-color)}
        .copy-pill{font-size:10px;font-weight:800;padding:6px 10px;border-radius:8px;background:rgba(0,229,255,.12);color:var(--accent);letter-spacing:.5px}
        .copy-pill.copied{background:rgba(0,200,100,.15);color:#00cc66}
        .footer{text-align:center;margin-top:28px;font-size:11px;color:var(--text-label)}
    </style>
</head>

<script>
function copyEmail() {
    navigator.clipboard.writeText('bncraft.to@gmail.com').then(() => {
        const b = document.getElementById('copyBadge');

        b.classList.add('copied');
        setTimeout(() => { b.textContent = 'COPY'; b.classList.remove('copied'); }, 2000);
    });
}
BNcraft.buildSettingsPanel('settingsPanelContent', { cardInfo: false, interface: false });
</script>
