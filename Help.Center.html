<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BNcraft | Help Center</title>
    <link rel="canonical" href="Help.Center.html">
    <script>
    (function () {
        var target = 'tutorial.html';
        fetch(target, { cache: 'no-store' })
            .then(function (r) {
                if (!r.ok) throw new Error('load failed');
                return r.text();
            })
            .then(function (html) {
                if (html.indexOf('Help Center could not load') !== -1) throw new Error('stub');
                document.open();
                document.write(html);
                document.close();
            })
            .catch(function () {
                document.body.innerHTML =
                    '<div style="font-family:sans-serif;padding:24px;max-width:520px;margin:40px auto">' +
                    '<h1>Help Center</h1>' +
                    '<p>Run <b>COPY-RESTORE.bat</b> in the BNcraft folder (copies tutorial from Downloads), or copy:</p>' +
                    '<code style="display:block;background:#111;color:#0ff;padding:12px;margin:12px 0">BNcraft-tuturial.html → tutorial.html</code>' +
                    '<p><a href="index.html">← Home</a></p></div>';
            });
    })();
    </script>
</head>
<body><p style="font-family:sans-serif;padding:24px">Loading Help Center…</p></body>
</html>
